name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: tests (product-category-classifier)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: product-category-classifier
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies (CPU-only)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy scikit-learn pytest

      - name: Run tests
        run: pytest -v
